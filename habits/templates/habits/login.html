{% extends "habits/base.html" %}

{% block title %}Login — Habit Tracker{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="auth-container w-full max-w-md rounded-2xl border border-white/20 bg-slate-900/80 p-6 shadow-2xl backdrop-blur-xl">
        <h1 class="auth-title text-center text-3xl font-bold text-white">Habit Tracker</h1>
        <p class="mt-2 mb-6 text-center text-sm text-slate-300">Stay consistent, one day at a time.</p>

        <div class="auth-tabs mb-5 flex rounded-xl bg-slate-800/80 p-1">
            <button class="auth-tab active flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-200" data-tab="login">Login</button>
            <button class="auth-tab flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-200" data-tab="register">Register</button>
        </div>

        <div id="auth-error" class="auth-error hidden mb-4 rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-sm text-rose-200"></div>

        <form id="login-form" class="auth-form flex flex-col gap-3">
            <input class="w-full rounded-lg border border-slate-700 bg-slate-800/80 px-3 py-2 text-slate-100 placeholder-slate-400 focus:border-brand-500 focus:outline-none" type="text" id="login-username" placeholder="Username" required>
            <input class="w-full rounded-lg border border-slate-700 bg-slate-800/80 px-3 py-2 text-slate-100 placeholder-slate-400 focus:border-brand-500 focus:outline-none" type="password" id="login-password" placeholder="Password" required>
            <button class="rounded-lg bg-brand-600 px-4 py-2 font-semibold text-white transition hover:bg-brand-700" type="submit">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden flex-col gap-3">
            <input class="w-full rounded-lg border border-slate-700 bg-slate-800/80 px-3 py-2 text-slate-100 placeholder-slate-400 focus:border-brand-500 focus:outline-none" type="text" id="register-username" placeholder="Username" required>
            <input class="w-full rounded-lg border border-slate-700 bg-slate-800/80 px-3 py-2 text-slate-100 placeholder-slate-400 focus:border-brand-500 focus:outline-none" type="email" id="register-email" placeholder="Email" required>
            <input class="w-full rounded-lg border border-slate-700 bg-slate-800/80 px-3 py-2 text-slate-100 placeholder-slate-400 focus:border-brand-500 focus:outline-none" type="password" id="register-password" placeholder="Password" required>
            <button class="rounded-lg bg-brand-600 px-4 py-2 font-semibold text-white transition hover:bg-brand-700" type="submit">Create account</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.auth-tab').forEach(t => {
                t.classList.remove('active', 'bg-brand-600', 'text-white');
                t.classList.add('text-slate-200');
            });
            tab.classList.add('active', 'bg-brand-600', 'text-white');
            tab.classList.remove('text-slate-200');
            const target = tab.dataset.tab;
            document.getElementById('login-form').classList.toggle('hidden', target !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', target !== 'register');
            document.getElementById('auth-error').classList.add('hidden');
        });
    });

    document.querySelector('.auth-tab.active')?.classList.add('bg-brand-600', 'text-white');

    function showError(message) {
        const el = document.getElementById('auth-error');
        el.textContent = message;
        el.classList.remove('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await auth.login(
                document.getElementById('login-username').value,
                document.getElementById('login-password').value,
            );
            window.location.href = '/';
        } catch (err) {
            showError(err.message);
        }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await auth.register(
                document.getElementById('register-username').value,
                document.getElementById('register-email').value,
                document.getElementById('register-password').value,
            );
            window.location.href = '/';
        } catch (err) {
            showError(err.message);
        }
    });
</script>
{% endblock %}
